name: Deploy

# Triggers ONLY on merge to main (push to main) — plus manual re-run.
# Validates (typecheck + lint + tests) then builds + deploys to Cloudflare Workers.
# WHY build on Linux: a Windows opennext build leaves Next's middleware require unpatched -> the
# live Worker 500s. See .claude/lessons/general/opennext-windows-build-middleware-500.md.
# GitHub-hosted ubuntu runners are free + unlimited for public repos.

on:
  push:
    branches: [main] # fires when a PR is merged into main
  workflow_dispatch: {} # manual re-deploy (not an automatic trigger)

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false # never cancel a deploy mid-upload; queue instead

jobs:
  deploy:
    name: Validate + deploy
    runs-on: ubuntu-latest
    env:
      # Server env vars are real Worker secrets (set once via `wrangler secret put`, persist across
      # deploys) — validated at runtime, not build. Skip boot validation during build/checks.
      SKIP_ENV_VALIDATION: "1"
      # Public vars: Next inlines NEXT_PUBLIC_* into the client bundle at BUILD time (public by design).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /portal/dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
      # Cloudflare Web Analytics beacon token (B5). PUBLIC by design — it is embedded in
      # the client HTML for every visitor, so a literal here is correct (not a secret).
      NEXT_PUBLIC_CF_BEACON_TOKEN: "22ff4d173055492fa0dff67fb4b9d64f"
      # Turnstile SITE key (MED-1). PUBLIC by design — rendered in the donate widget.
      # The paired TURNSTILE_SECRET_KEY is a Worker secret (dashboard), never here.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADvw_PneE6vlgLyv"
      # Cloudflare deploy auth.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "23a2b1c11f499225ec43f734cba12e60"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # wrangler 4.x requires Node >= 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- validate before deploying; any failure stops the deploy ---
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test:run

      # --- build (Linux) + deploy ---
      - name: Build + deploy to Cloudflare
        run: pnpm run deploy

      # --- post-deploy asset-integrity guard (UX-19 / D1) ---
      # A deploy once shipped with every client JS chunk 404ing while the HTML itself
      # served 200 — curl-the-HTML smoke checks cannot catch a dead client bundle
      # (lesson: curl-smoke-check-misses-dead-client-js). Fetch the live homepage,
      # extract a referenced /_next/static chunk URL, and require it to be 200.
      - name: Verify client assets are live
        run: |
          BASE="https://rajyash-food-rescue.shahveerkeaten.workers.dev"
          HTML="$(curl -fsSL --retry 3 --retry-delay 5 "$BASE/")"
          CHUNK="$(printf '%s' "$HTML" | grep -oE '/_next/static/[^"]+\.js' | head -1)"
          if [ -z "$CHUNK" ]; then
            echo "::error::No /_next/static/*.js reference found in the homepage HTML — build looks broken."
            exit 1
          fi
          echo "Checking asset: $CHUNK"
          curl -fsS -o /dev/null --retry 3 --retry-delay 5 "$BASE$CHUNK" \
            || { echo "::error::Client asset $CHUNK is not serving 200 — deploy shipped a dead client bundle."; exit 1; }
          echo "Client asset integrity OK."
